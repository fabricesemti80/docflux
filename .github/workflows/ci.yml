name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libcairo2-dev pkg-config
      
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cairo pkg-config
          echo "PKG_CONFIG=$(brew --prefix)/bin/pkg-config" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix cairo)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"
      
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      
      - run: uv sync
      
      - run: echo "No tests configured"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config
      
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      
      - run: uv sync --extra lint
      
      - name: Check Ruff
        run: uv run ruff check .
