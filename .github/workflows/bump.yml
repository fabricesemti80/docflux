name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${CURRENT#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.version_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          NEW_VERSION_NO_V="$MAJOR.$MINOR.$PATCH"

          echo "Current version: $CURRENT"
          echo "New version: $NEW_VERSION"
          echo "version_type: ${{ github.event.inputs.version_type }}"

          # Update version in pyproject.toml
          if grep -q "^version = " pyproject.toml; then
            sed -i.bak "s/^version = .*/version = \"$NEW_VERSION_NO_V\"/" pyproject.toml
            rm -f pyproject.toml.bak
          else
            echo "ERROR: Could not find version line in pyproject.toml"
            exit 1
          fi

          # Update version in convert.py
          if grep -q "^__version__ = " convert.py; then
            sed -i.bak "s/^__version__ = .*/\__version__ = \"$NEW_VERSION_NO_V\"/" convert.py
            rm -f convert.py.bak
          else
            echo "ERROR: Could not find __version__ line in convert.py"
            exit 1
          fi

          echo "previous_version=v$CURRENT" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          if git diff --quiet; then
            echo "ERROR: No changes detected after version bump"
            exit 1
          fi

          git add pyproject.toml convert.py
          git commit -m "Bump version to $NEW_VERSION"
          git tag "$NEW_VERSION"
          git push origin main --tags
        shell: bash

      - name: Trigger release workflow
        run: gh workflow run release.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
